name: Build NewAPI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Cache Bun modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.bun/install/cache
          web/classic/node_modules
          web/default/node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('web/**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
          
    - name: Download Go dependencies
      run: go mod download
      
    - name: Build Classic Frontend
      run: |
        cd web
        bun install --frozen-lockfile
        cd classic
        bun run build
        
    - name: Build Default Frontend
      run: |
        cd web
        bun install --frozen-lockfile
        cd default
        bun run build
        
    - name: Build binary
      run: |
        CGO_ENABLED=0 GOOS=linux go build -ldflags "-s -w" -o new-api main.go
        ls -lh new-api
        file new-api
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: new-api-binary
        path: new-api
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          NewAPI build with data export/import feature
          
          ## Features
          - Data export/import for root user
          - Channel management
          - Token management
          - User management
        files: new-api
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
